name: Benchmark

on:

  workflow_dispatch:

jobs:
  benchmark:

    runs-on: ubuntu-24.04-arm
    steps:

      - name: Setup NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0

      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Run benchmarks
        run: dotnet run -c Release --allCategories EngineComparison
        working-directory: Jint.Benchmark

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          path: Jint.Benchmark/BenchmarkDotNet.Artifacts
